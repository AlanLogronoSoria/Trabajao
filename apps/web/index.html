<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESFOT Auth</title>
    
    <script>
      // Captura todo lo que devuelva Supabase
      const search = window.location.search;
      const hash = window.location.hash;

      // Si hay datos, redirige de inmediato a Expo Go
      if (search || hash) {
        window.location.replace(`exp://192.168.100.70:8081/--/home${search}${hash}`);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
